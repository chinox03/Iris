<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" role="img" aria-label="Aria · asistente IA Iris">
  <title>Aria</title>
  <defs>
    <!-- Glow ambiente exterior -->
    <radialGradient id="a-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#9D90FB" stop-opacity="0.35"/>
      <stop offset="55%"  stop-color="#5847E0" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#5847E0" stop-opacity="0"/>
    </radialGradient>
    <!-- Cuerpo de la esfera: highlight → indigo → profundo -->
    <radialGradient id="a-body" cx="38%" cy="32%" r="72%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="14%"  stop-color="#E2DEFF"/>
      <stop offset="36%"  stop-color="#9D90FB"/>
      <stop offset="60%"  stop-color="#5847E0"/>
      <stop offset="84%"  stop-color="#2D1F8A"/>
      <stop offset="100%" stop-color="#110B3B"/>
    </radialGradient>
    <!-- Specular highlight -->
    <radialGradient id="a-spec" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.72"/>
      <stop offset="55%"  stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <!-- Sombra profunda bottom-right -->
    <radialGradient id="a-shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#0A0826" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0A0826" stop-opacity="0"/>
    </radialGradient>
    <!-- Núcleo brillante -->
    <radialGradient id="a-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="55%"  stop-color="#F2F0FF"/>
      <stop offset="100%" stop-color="#C6BEFE"/>
    </radialGradient>
    <!-- Clip y filtros -->
    <clipPath id="a-clip"><circle cx="140" cy="140" r="100"/></clipPath>
    <filter id="a-petal-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.2"/>
    </filter>
  </defs>

  <!-- 0 · halo ambiente -->
  <circle cx="140" cy="140" r="130" fill="url(#a-glow)"/>

  <!-- 1 · cuerpo de la esfera -->
  <circle cx="140" cy="140" r="100" fill="url(#a-body)"/>

  <!-- 2 · estrías de iris floral (12 líneas radiales sutiles) -->
  <g clip-path="url(#a-clip)" opacity="0.17" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round" fill="none">
    <line x1="140" y1="140" x2="140" y2="40"/>
    <line x1="140" y1="140" x2="190" y2="53.4"/>
    <line x1="140" y1="140" x2="226.6" y2="90"/>
    <line x1="140" y1="140" x2="240" y2="140"/>
    <line x1="140" y1="140" x2="226.6" y2="190"/>
    <line x1="140" y1="140" x2="190" y2="226.6"/>
    <line x1="140" y1="140" x2="140" y2="240"/>
    <line x1="140" y1="140" x2="90" y2="226.6"/>
    <line x1="140" y1="140" x2="53.4" y2="190"/>
    <line x1="140" y1="140" x2="40" y2="140"/>
    <line x1="140" y1="140" x2="53.4" y2="90"/>
    <line x1="140" y1="140" x2="90" y2="53.4"/>
  </g>

  <!-- 3 · sombra esférica bottom-right -->
  <g clip-path="url(#a-clip)">
    <ellipse cx="186" cy="200" rx="80" ry="64" fill="url(#a-shadow)" transform="rotate(-25 186 200)"/>
  </g>

  <!-- 4 · specular highlight (glass quality) -->
  <g clip-path="url(#a-clip)">
    <ellipse cx="104" cy="88" rx="44" ry="28" fill="url(#a-spec)" transform="rotate(-30 104 88)"/>
  </g>

  <!-- 5 · pétalos isotipo Iris (blancos, primario glow) -->
  <!-- glow del pétalo primario -->
  <path d="M140 82.8 Q140 119.2 176.4 119.2"
        stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" fill="none"
        opacity="0.45" filter="url(#a-petal-glow)"/>
  <!-- 3 pétalos secundarios -->
  <g stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.62">
    <path d="M197.2 140 Q160.8 140 160.8 176.4"/>
    <path d="M140 197.2 Q140 160.8 103.6 160.8"/>
    <path d="M82.8 140 Q119.2 140 119.2 103.6"/>
  </g>
  <!-- pétalo primario -->
  <path d="M140 82.8 Q140 119.2 176.4 119.2"
        stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" fill="none"/>

  <!-- 6 · núcleo -->
  <circle cx="140" cy="140" r="12" fill="url(#a-core)"/>
  <circle cx="138" cy="138" r="4"  fill="#FFFFFF" opacity="0.95"/>
</svg>
